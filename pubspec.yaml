name: pion_bridge
description: Flutter library wrapping Pion WebRTC via a local Go WebSocket sidecar.
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  msgpack_dart: ^1.0.1
  web_socket_channel: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: io.filemingo.pionbridge
        pluginClass: PionBridgePlugin
